x-airflow-common: &airflow-common
  build: .
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    AIRFLOW__WEBSERVER__SECRET_KEY: 'brazil-open-data-pipeline-secret'
    AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    # Data paths inside the container
    DATA_LAKE_PATH: /opt/airflow/data
    WAREHOUSE_PATH: /opt/airflow/warehouse
    SQL_PATH: /opt/airflow/sql
  # Run as the built-in airflow user (UID 50000) — don't override with host UID
  volumes:
    - ./dags:/opt/airflow/dags
    - ./plugins:/opt/airflow/plugins
    - ./include:/opt/airflow/include
    - ./sql:/opt/airflow/sql
    - ./data:/opt/airflow/data
    - ./warehouse:/opt/airflow/warehouse
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/logs/dag_processor_manager /opt/airflow/logs/scheduler \
                 /opt/airflow/data/raw /opt/airflow/data/bronze \
                 /opt/airflow/data/silver /opt/airflow/data/gold /opt/airflow/warehouse
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
        airflow pools set gov_api 3 "Rate-limited pool for Brazilian government APIs" || true
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    command: bash -c "mkdir -p /opt/airflow/logs/dag_processor_manager /opt/airflow/logs/scheduler && airflow webserver"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: bash -c "mkdir -p /opt/airflow/logs/dag_processor_manager /opt/airflow/logs/scheduler && airflow scheduler"
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $(hostname)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always

volumes:
  postgres-db:
  airflow-logs:
